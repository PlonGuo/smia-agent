name: Notify Users on Deploy

on:
  push:
    branches: [main]

jobs:
  notify:
    name: Send Update Email
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Fly.io deploy and verify
        run: |
          for i in $(seq 1 6); do
            curl -sf https://smia-agent.fly.dev/api/health && exit 0
            sleep 10
          done
          exit 1

      - name: Get commits since last notification
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.sha }}
          PREV_SHA: ${{ github.event.before }}
          REPO: ${{ github.repository }}
        run: |
          echo "Comparing ${PREV_SHA:0:7}...${CURRENT_SHA:0:7}"
          gh api "/repos/${REPO}/compare/${PREV_SHA}...${CURRENT_SHA}" \
            --jq '{commits: [.commits[] | {id: .sha, message: (.commit.message // ""), author: (.commit.author.name // "unknown"), url: (.html_url // "")}]}' \
            > /tmp/payload.json

      - name: Send notification to backend
        uses: actions/github-script@v7
        env:
          API_URL: ${{ secrets.SMIA_API_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        with:
          script: |
            const fs = require('fs');
            const payload = fs.readFileSync('/tmp/payload.json', 'utf8');

            const baseUrl = process.env.API_URL.replace(/\/+$/, '');
            const url = `${baseUrl}/api/internal/notify-update`;
            console.log(`Sending ${JSON.parse(payload).commits.length} commits to ${url}`);

            const response = await fetch(url, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-internal-secret': process.env.INTERNAL_SECRET,
              },
              body: payload,
            });

            const body = await response.json();
            console.log(`HTTP ${response.status}:`, JSON.stringify(body, null, 2));

            if (!response.ok) {
              core.setFailed(`API returned ${response.status}`);
            }
