name: Notify Users on Deploy

on:
  deployment_status:

jobs:
  notify:
    name: Send Update Email
    runs-on: ubuntu-latest
    if: >-
      github.event.deployment_status.state == 'success' &&
      github.event.deployment_status.environment == 'Production'
    steps:
      - name: Get commits since last deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CURRENT_SHA="${{ github.event.deployment.sha }}"
          REPO="${{ github.repository }}"

          # Find previous successful production deployment SHA
          PREV_SHA=$(gh api "/repos/${REPO}/deployments?environment=Production&per_page=10" \
            --jq "[.[] | select(.sha != \"${CURRENT_SHA}\")] | .[0].sha // empty")

          if [ -n "$PREV_SHA" ]; then
            echo "Comparing ${PREV_SHA:0:7}...${CURRENT_SHA:0:7}"
            COMMITS=$(gh api "/repos/${REPO}/compare/${PREV_SHA}...${CURRENT_SHA}" \
              --jq '{commits: [.commits[] | {id: .sha, message: .commit.message, author: .commit.author.name, url: .html_url}]}')
          else
            echo "No previous deployment found, using single commit"
            COMMITS=$(gh api "/repos/${REPO}/commits/${CURRENT_SHA}" \
              --jq '{commits: [{id: .sha, message: .commit.message, author: .commit.author.name, url: .html_url}]}')
          fi

          # SECURITY: Write to file, never interpolate untrusted data in ${{ }}
          echo "$COMMITS" > /tmp/payload.json

      - name: Send notification to backend
        env:
          API_URL: ${{ secrets.SMIA_API_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        run: |
          COMMIT_COUNT=$(jq '.commits | length' /tmp/payload.json)
          echo "Sending notification with ${COMMIT_COUNT} commits"

          curl -f -X POST "${API_URL}/api/internal/notify-update" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${INTERNAL_SECRET}" \
            -d @/tmp/payload.json \
            --max-time 55
