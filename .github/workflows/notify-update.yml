name: Notify Users on Deploy

on:
  deployment_status:

jobs:
  notify:
    name: Send Update Email
    runs-on: ubuntu-latest
    if: ${{ github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Production' }}
    steps:
      - name: Get commits since last deployment
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.event.deployment.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Deployment SHA: ${CURRENT_SHA:0:7}"

          PREV_SHA=$(gh api "/repos/${REPO}/deployments?environment=Production&per_page=10" \
            --jq "[.[] | select(.sha != \"${CURRENT_SHA}\")] | .[0].sha // empty")

          if [ -n "$PREV_SHA" ]; then
            echo "Comparing ${PREV_SHA:0:7}...${CURRENT_SHA:0:7}"
            gh api "/repos/${REPO}/compare/${PREV_SHA}...${CURRENT_SHA}" \
              --jq '{commits: [.commits[] | {id: .sha, message: (.commit.message // ""), author: (.commit.author.name // "unknown"), url: (.html_url // "")}]}' \
              > /tmp/payload.json
          else
            echo "No previous deployment found, using single commit"
            gh api "/repos/${REPO}/commits/${CURRENT_SHA}" \
              --jq '{commits: [{id: .sha, message: (.commit.message // ""), author: (.commit.author.name // "unknown"), url: (.html_url // "")}]}' \
              > /tmp/payload.json
          fi

      - name: Send notification to backend
        env:
          API_URL: ${{ secrets.SMIA_API_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        run: |
          echo "Payload:"
          cat /tmp/payload.json | jq .
          PAYLOAD_SIZE=$(wc -c < /tmp/payload.json)
          COMMIT_COUNT=$(jq '.commits | length' /tmp/payload.json)
          echo "Payload size: ${PAYLOAD_SIZE} bytes, ${COMMIT_COUNT} commits"

          # Strip whitespace and trailing slash from URL to avoid double-slash in path
          CLEAN_URL=$(echo -n "${API_URL}" | tr -d '[:space:]' | sed 's:/*$::')
          FULL_URL="${CLEAN_URL}/api/internal/notify-update"
          echo "Target URL: ${FULL_URL}"

          # Read payload into variable and send as inline data
          PAYLOAD=$(cat /tmp/payload.json)
          HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -H "x-internal-secret: ${INTERNAL_SECRET}" \
            --data-binary "$PAYLOAD" \
            --max-time 55 "${FULL_URL}")

          echo "HTTP status: ${HTTP_CODE}"
          echo "--- response body ---"
          cat /tmp/response.json | jq . 2>/dev/null || cat /tmp/response.json
          if [ "$HTTP_CODE" -ge 400 ]; then
            exit 1
          fi
