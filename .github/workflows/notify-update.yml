# Sends update email to all users when a production deployment succeeds.
name: Notify Users on Deploy

on:
  deployment_status:

jobs:
  notify:
    name: Send Update Email
    runs-on: ubuntu-latest
    if: ${{ github.event.deployment_status.state == 'success' && github.event.deployment_status.environment == 'Production' }}
    steps:
      - name: Get commits since last deployment
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_SHA: ${{ github.event.deployment.sha }}
          REPO: ${{ github.repository }}
        run: |
          echo "Deployment SHA: ${CURRENT_SHA:0:7}"

          PREV_SHA=$(gh api "/repos/${REPO}/deployments?environment=Production&per_page=10" \
            --jq "[.[] | select(.sha != \"${CURRENT_SHA}\")] | .[0].sha // empty")

          if [ -n "$PREV_SHA" ]; then
            echo "Comparing ${PREV_SHA:0:7}...${CURRENT_SHA:0:7}"
            gh api "/repos/${REPO}/compare/${PREV_SHA}...${CURRENT_SHA}" \
              --jq '{commits: [.commits[] | {id: .sha, message: (.commit.message // ""), author: (.commit.author.name // "unknown"), url: (.html_url // "")}]}' \
              > /tmp/payload.json
          else
            echo "No previous deployment found, using single commit"
            gh api "/repos/${REPO}/commits/${CURRENT_SHA}" \
              --jq '{commits: [{id: .sha, message: (.commit.message // ""), author: (.commit.author.name // "unknown"), url: (.html_url // "")}]}' \
              > /tmp/payload.json
          fi

      - name: Send notification to backend
        uses: actions/github-script@v7
        env:
          API_URL: ${{ secrets.SMIA_API_URL }}
          INTERNAL_SECRET: ${{ secrets.INTERNAL_SECRET }}
        with:
          script: |
            const fs = require('fs');
            const payload = fs.readFileSync('/tmp/payload.json', 'utf8');

            const baseUrl = process.env.API_URL.replace(/\/+$/, '');
            const url = `${baseUrl}/api/internal/notify-update`;
            console.log(`Sending ${JSON.parse(payload).commits.length} commits to ${url}`);

            const response = await fetch(url, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'x-internal-secret': process.env.INTERNAL_SECRET,
              },
              body: payload,
            });

            const body = await response.json();
            console.log(`HTTP ${response.status}:`, JSON.stringify(body, null, 2));

            if (!response.ok) {
              core.setFailed(`API returned ${response.status}`);
            }
